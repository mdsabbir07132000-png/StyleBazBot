<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@Cotall_bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:'Hind Siliguri',sans-serif;
            background:#0f172a;
            color:#fff;
        }
        header{
            background:#111827;
            padding:20px;
            text-align:center;
            border-bottom:3px solid #2563eb;
        }
        header h1{
            color:#60a5fa;
            font-size:28px;
        }
        header p{
            color:#94a3b8;
            margin-top:5px;
        }
        .container{
            max-width:800px;
            margin:auto;
            padding:20px;
        }
        .download-card{
            background:#1e293b;
            padding:35px;
            border-radius:15px;
            text-align:center;
            margin-top:25px;
            border:1px solid #334155;
        }
        .icon{
            font-size:70px;
            margin-bottom:15px;
        }
        .file-name{
            font-size:28px;
            font-weight:bold;
            margin-bottom:10px;
        }
        .download-btn{
            display:inline-block;
            margin-top:25px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            padding:15px 30px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }
        .download-btn:hover{
            background:#1d4ed8;
        }
        .info-box{
            margin-top:25px;
            background:#1e293b;
            padding:25px;
            border-radius:15px;
            border:1px solid #334155;
        }
        .info-box h2{
            color:#60a5fa;
            margin-bottom:10px;
        }
        .info-box p,
        .info-box li{
            color:#cbd5e1;
            line-height:1.8;
        }
        footer{
            text-align:center;
            padding:20px;
            color:#94a3b8;
        }
    </style>
</head>
<body>

<header>
    <h1>StyleBazBot</h1>
    <p>Python</p>
</header>

<div class="StyleBazBot">
    <div class="download-card">
        <div class="icon">📦</div>
        <div class="file-name">StyleBazBot</div>
        <br>
        <a href="StyleBazBot.py" download class="download-btn">
            ⬇️ ডাউনলোড করুন
        </a>
    </div>

    <div class="info-box">
        <h2>✅ প্রয়োজনীয়তা</h2>
        <ul>
            <li>Bot Token: টেলিগ্রাম বট ফাদার থেকে পাওয়া টোকেন</li>
            <li>Admin ID: 8709449192</li>
        </ul>
    </div>
</div>

<footer>
    © 2026 সকল অধিকার সংরক্ষিত
</footer>

</body>
</html>
